<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tayo Collection - House of Tayo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #fff; overflow-x: hidden; }
        
        /* --- Premium Navigation & Logo --- */
        .main-nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 1.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            transition: background 0.4s ease, backdrop-filter 0.4s ease, padding 0.4s ease;
        }

        .main-nav.scrolled {
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 1rem 5%;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nav-brand-logo {
            height: 55px;
            width: auto;
            filter: invert(1) brightness(2) contrast(1.2); 
            mix-blend-mode: screen; 
            transform-origin: left center;
            transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94), filter 0.5s ease;
            will-change: transform;
        }

        .nav-brand:hover .nav-brand-logo {
            transform: scale(1.05);
            filter: invert(1) brightness(2) contrast(1.2) drop-shadow(0 0 10px rgba(255,255,255,0.3));
        }

        .nav-links { display: flex; gap: 2.5rem; }
        .nav-links a { color: #fff; text-decoration: none; text-transform: uppercase; letter-spacing: 0.15em; font-size: 0.85rem; font-weight: 300; transition: color 0.3s ease, opacity 0.3s ease; }
        .nav-links a:hover { opacity: 0.6; }

        /* --- Mobile Menu Toggle (Hamburger) --- */
        .mobile-menu-toggle {
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
            z-index: 1001;
        }

        .mobile-menu-toggle span {
            width: 25px;
            height: 2px;
            background-color: #fff;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .mobile-menu-toggle.active span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
        .mobile-menu-toggle.active span:nth-child(2) { opacity: 0; }
        .mobile-menu-toggle.active span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

        /* --- Mobile Optimization & Slide-out Menu --- */
        @media (max-width: 900px) {
            .main-nav { padding: 1.2rem 5%; }
            .nav-brand-logo { height: 40px; flex-shrink: 0; }
            .mobile-menu-toggle { display: flex; }
            .nav-links { 
                position: fixed; top: 0; right: -100%; width: 70%; max-width: 300px; height: 100vh;
                background: #050505; flex-direction: column; padding-top: 6rem; padding-left: 2rem;
                gap: 2rem; transition: right 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
                box-shadow: -10px 0 30px rgba(0,0,0,0.8);
            }
            .nav-links.active { right: 0; }
            .nav-links a { font-size: 1.2rem; }
        }
        
        /* Collection Grid & 3D Cards */
        .page-header { text-align: center; padding: 8rem 5% 2rem; } 
        .page-header h1 { font-size: clamp(2rem, 4vw, 4rem); font-weight: 300; letter-spacing: 0.2em; text-transform: uppercase; }
        
        .collection-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 3rem; padding: 4rem 5% 8rem; max-width: 1400px; margin: 0 auto; }
        
        .product-card { perspective: 1000px; height: 500px; cursor: pointer; }
        .product-inner { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; overflow: hidden; border-radius: 4px; transition: transform 0.5s ease-out; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .product-inner img { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        .product-info { position: absolute; bottom: 0; left: 0; width: 100%; padding: 2.5rem 2rem; background: linear-gradient(to top, rgba(0,0,0,0.95), transparent); transform: translateZ(50px); color: #fff; pointer-events: none; }
        .product-info h3 { font-size: 1.2rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.5rem; }
        .product-info p { font-size: 0.9rem; color: #aaa; font-weight: 300; }
    </style>
</head>
<body>
    <nav class="main-nav">
        <a href="index.html" class="nav-brand">
            <img src="assets/9wcnA2qNaQj3hspuRrLkS4.png" alt="House of Tayo Logo" class="nav-brand-logo">
        </a>

        <div class="mobile-menu-toggle">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="nav-links">
            <a href="tayo.html">Collection</a>
            <a href="our-story.html">Our Story</a>
            <a href="press.html">Press</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <header class="page-header">
        <h1>The Tayo Collection</h1>
    </header>

    <section class="collection-grid">
        <div class="product-card">
            <div class="product-inner">
                <img src="assets/bwPr-U416S2ekbIOPMD41P.png" alt="Chevron Shirt">
                <div class="product-info">
                    <h3>Rwanda Chevron</h3>
                    <p>Signature Collection</p>
                </div>
            </div>
        </div>
        <div class="product-card">
            <div class="product-inner">
                <img src="assets/bRKvv9aBCUj1ybR688i_PL.png" alt="Teal Tunic">
                <div class="product-info">
                    <h3>Heritage Tunic</h3>
                    <p>Teal Edition</p>
                </div>
            </div>
        </div>
        <div class="product-card">
            <div class="product-inner">
                <img src="assets/ac1GQibmuhAaohN2Lwwk03.png" alt="Patchwork Top">
                <div class="product-info">
                    <h3>Artisan Patchwork</h3>
                    <p>Limited Run</p>
                </div>
            </div>
        </div>
    </section>

    <script>
        // Mobile Hamburger Menu Logic
        const mobileToggle = document.querySelector('.mobile-menu-toggle');
        const navLinks = document.querySelector('.nav-links');

        if (mobileToggle) {
            mobileToggle.addEventListener('click', () => {
                mobileToggle.classList.toggle('active');
                navLinks.classList.toggle('active');
            });
        }

        // Glassmorphism Nav Scroll Effect
        window.addEventListener('scroll', () => {
            const nav = document.querySelector('.main-nav');
            if (window.scrollY > 50) {
                nav.classList.add('scrolled');
            } else {
                nav.classList.remove('scrolled');
            }
        });

        // 3D Hover Interaction Logic
        document.querySelectorAll('.product-card').forEach(card => {
            const inner = card.querySelector('.product-inner');
            
            card.addEventListener('mousemove', e => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                // Calculate rotation (max 15 degrees for a subtle, premium feel)
                const rotateX = ((y - rect.height / 2) / (rect.height / 2)) * -15;
                const rotateY = ((x - rect.width / 2) / (rect.width / 2)) * 15;
                
                inner.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
                inner.style.transition = 'none'; // Remove transition for instant cursor tracking
            });
            
            card.addEventListener('mouseleave', () => {
                // Snap back to original position
                inner.style.transform = `rotateX(0deg) rotateY(0deg)`;
                inner.style.transition = 'transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94)'; 
            });
        });
    </script>
</body>
</html>
