<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - House of Tayo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #fff; }

        /* --- Premium Navigation & Logo --- */
        .main-nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 1.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            transition: background 0.4s ease, backdrop-filter 0.4s ease, padding 0.4s ease;
        }

        .main-nav.scrolled {
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 1rem 5%;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nav-brand-logo {
            height: 55px;
            width: auto;
            filter: invert(1) brightness(2) contrast(1.2); 
            mix-blend-mode: screen; 
            transform-origin: left center;
            transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94), filter 0.5s ease;
            will-change: transform;
        }

        .nav-brand:hover .nav-brand-logo {
            transform: scale(1.05);
            filter: invert(1) brightness(2) contrast(1.2) drop-shadow(0 0 10px rgba(255,255,255,0.3));
        }

        .nav-links { display: flex; gap: 2.5rem; }
        .nav-links a { color: #fff; text-decoration: none; text-transform: uppercase; letter-spacing: 0.15em; font-size: 0.85rem; font-weight: 300; transition: color 0.3s ease, opacity 0.3s ease; }
        .nav-links a:hover { opacity: 0.6; }

        @media (max-width: 900px) {
            .main-nav { padding: 1.2rem 5%; }
            .nav-brand-logo { height: 40px; }
            .nav-links { display: none; }
        }

        .contact-layout { display: flex; min-height: 100vh; }
        
        /* Left Info Side */
        .info-panel { width: 40%; background-color: #0a0a0a; padding: 10rem 5%; display: flex; flex-direction: column; justify-content: center; }
        .info-panel h2 { font-size: 2rem; font-weight: 300; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 2rem; }
        .info-panel p { color: #888; font-weight: 300; line-height: 1.8; margin-bottom: 2rem; }
        .contact-details { list-style: none; }
        .contact-details li { margin-bottom: 1rem; color: #ccc; font-weight: 300; letter-spacing: 0.05em;}

        /* Right Form Side */
        .form-panel { width: 60%; padding: 10rem 10%; display: flex; align-items: center; }
        .bespoke-form { width: 100%; max-width: 600px; }
        
        /* Floating Labels CSS */
        .input-group { position: relative; margin-bottom: 3rem; }
        .input-group input, .input-group textarea { width: 100%; padding: 10px 0; font-size: 1.1rem; color: #fff; background: transparent; border: none; border-bottom: 1px solid #333; outline: none; transition: border-color 0.3s; font-family: 'Inter', sans-serif; resize: none; }
        .input-group label { position: absolute; top: 10px; left: 0; font-size: 1.1rem; color: #666; pointer-events: none; transition: 0.3s ease all; font-weight: 300; }
        
        .input-group input:focus ~ label, .input-group input:valid ~ label,
        .input-group textarea:focus ~ label, .input-group textarea:valid ~ label { top: -20px; font-size: 0.8rem; color: #fff; letter-spacing: 0.1em; text-transform: uppercase; }
        .input-group input:focus, .input-group textarea:focus { border-bottom: 1px solid #fff; }

        .submit-btn { padding: 1.2rem 3rem; background: #fff; color: #000; border: none; font-weight: 500; text-transform: uppercase; letter-spacing: 0.15em; cursor: pointer; transition: background 0.3s, color 0.3s; width: 100%; margin-top: 1rem; }
        .submit-btn:hover { background: #ccc; }

        @media (max-width: 900px) {
            .contact-layout { flex-direction: column; }
            .info-panel, .form-panel { width: 100%; padding: 6rem 5%; }
        }
    </style>
</head>
<body>
    <nav class="main-nav">
        <a href="index.html" class="nav-brand">
            <img src="assets/9wcnA2qNaQj3hspuRrLkS4.png" alt="House of Tayo Logo" class="nav-brand-logo">
        </a>
        <div class="nav-links">
            <a href="tayo.html">Collection</a>
            <a href="our-story.html">Our Story</a>
            <a href="press.html">Press</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <div class="contact-layout">
        <div class="info-panel">
            <h2>Get in Touch</h2>
            <p>Whether you are inquiring about a bespoke fitting, press opportunities, or carrying House of Tayo in your boutique, our team in Kigali is ready to assist you.</p>
            <ul class="contact-details">
                <li>📍 KG 9 Ave, Kigali, Rwanda</li>
                <li>📧 info@houseoftayo.com</li>
                <li>📞 +250 784 058 996</li>
            </ul>
        </div>

        <div class="form-panel">
            <form class="bespoke-form" onsubmit="event.preventDefault(); alert('Backend PHP integration ready for setup!');">
                <div class="input-group">
                    <input type="text" id="name" required>
                    <label for="name">Full Name</label>
                </div>
                <div class="input-group">
                    <input type="email" id="email" required>
                    <label for="email">Email Address</label>
                </div>
                <div class="input-group">
                    <input type="text" id="subject" required>
                    <label for="subject">Subject</label>
                </div>
                <div class="input-group">
                    <textarea id="message" rows="4" required></textarea>
                    <label for="message">Your Message</label>
                </div>
                <button type="submit" class="submit-btn">Send Inquiry</button>
            </form>
        </div>
    </div>

    <script>
        // Glassmorphism Nav Scroll Effect
        window.addEventListener('scroll', () => {
            const nav = document.querySelector('.main-nav');
            if (window.scrollY > 50) {
                nav.classList.add('scrolled');
            } else {
                nav.classList.remove('scrolled');
            }
        });
    </script>
</body>
</html>
