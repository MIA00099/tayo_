<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Press - House of Tayo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: #000; overflow: hidden; }

        /* --- Premium Navigation & Logo --- */
        .main-nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 1.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            transition: background 0.4s ease, backdrop-filter 0.4s ease, padding 0.4s ease;
        }

        .main-nav.scrolled {
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 1rem 5%;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nav-brand-logo {
            height: 55px;
            width: auto;
            filter: invert(1) brightness(2) contrast(1.2); 
            mix-blend-mode: screen; 
            transform-origin: left center;
            transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94), filter 0.5s ease;
            will-change: transform;
        }

        .nav-brand:hover .nav-brand-logo {
            transform: scale(1.05);
            filter: invert(1) brightness(2) contrast(1.2) drop-shadow(0 0 10px rgba(255,255,255,0.3));
        }

        .nav-links { display: flex; gap: 2.5rem; }
        .nav-links a { color: #fff; text-decoration: none; text-transform: uppercase; letter-spacing: 0.15em; font-size: 0.85rem; font-weight: 300; transition: color 0.3s ease, opacity 0.3s ease; }
        .nav-links a:hover { opacity: 0.6; }

        /* --- Mobile Menu Toggle (Hamburger) --- */
        .mobile-menu-toggle {
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
            z-index: 1001;
        }

        .mobile-menu-toggle span {
            width: 25px;
            height: 2px;
            background-color: #fff;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .mobile-menu-toggle.active span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
        .mobile-menu-toggle.active span:nth-child(2) { opacity: 0; }
        .mobile-menu-toggle.active span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

        /* --- Mobile Optimization & Slide-out Menu --- */
        @media (max-width: 900px) {
            .main-nav { padding: 1.2rem 5%; }
            .nav-brand-logo { height: 40px; flex-shrink: 0; }
            .mobile-menu-toggle { display: flex; }
            .nav-links { 
                position: fixed; top: 0; right: -100%; width: 70%; max-width: 300px; height: 100vh;
                background: #050505; flex-direction: column; padding-top: 6rem; padding-left: 2rem;
                gap: 2rem; transition: right 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
                box-shadow: -10px 0 30px rgba(0,0,0,0.8);
            }
            .nav-links.active { right: 0; }
            .nav-links a { font-size: 1.2rem; }
        }

        /* Background Image Reveal */
        .press-bg { 
            position: absolute; 
            inset: 0; 
            background-size: cover; 
            background-position: center; 
            opacity: 0; 
            transition: opacity 0.5s ease, transform 1.5s ease; 
            z-index: 1; 
            filter: grayscale(100%); 
        }

        /* Kinetic Typography List */
        .press-section { height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; z-index: 10; }
        .press-list { list-style: none; text-align: center; display: flex; flex-direction: column; gap: 1rem; }
        
        .press-list li { 
            font-size: clamp(3rem, 8vw, 8rem); 
            font-weight: 700; 
            color: transparent; 
            -webkit-text-stroke: 1px #333; 
            cursor: pointer; 
            text-transform: uppercase; 
            transition: all 0.4s ease; 
            line-height: 1; 
        }
        
        .press-list li:hover { 
            color: #fff; 
            -webkit-text-stroke: 1px #fff; 
            transform: scale(1.05); 
        }
    </style>
</head>
<body>
    <nav class="main-nav">
        <a href="index.html" class="nav-brand">
            <img src="assets/9wcnA2qNaQj3hspuRrLkS4.png" alt="House of Tayo Logo" class="nav-brand-logo">
        </a>
        
        <div class="mobile-menu-toggle">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="nav-links">
            <a href="tayo.html">Collection</a>
            <a href="our-story.html">Our Story</a>
            <a href="press.html">Press</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <div class="press-bg" id="press-bg"></div>

    <section class="press-section">
        <ul class="press-list">
            <li data-img="url('assets/8fL89cCzSCzd62mSANDkM-.png')">Vogue</li>
            <li data-img="url('assets/ax-KEXiURnl5eBE8sePk5q.png')">GQ Africa</li>
            <li data-img="url('assets/bwPr-U416S2ekbIOPMD41P.png')">CNN Style</li>
            <li data-img="url('assets/ac1GQibmuhAaohN2Lwwk03.png')">Forbes</li>
        </ul>
    </section>

    <script>
        // Mobile Hamburger Menu Logic
        const mobileToggle = document.querySelector('.mobile-menu-toggle');
        const navLinks = document.querySelector('.nav-links');

        if (mobileToggle) {
            mobileToggle.addEventListener('click', () => {
                mobileToggle.classList.toggle('active');
                navLinks.classList.toggle('active');
            });
        }

        // Glassmorphism Nav Scroll Effect
        window.addEventListener('scroll', () => {
            const nav = document.querySelector('.main-nav');
            if (window.scrollY > 50) {
                nav.classList.add('scrolled');
            } else {
                nav.classList.remove('scrolled');
            }
        });

        const pressItems = document.querySelectorAll('.press-list li');
        const pressBg = document.getElementById('press-bg');

        pressItems.forEach(item => {
            item.addEventListener('mouseenter', () => {
                pressBg.style.backgroundImage = item.getAttribute('data-img');
                pressBg.style.opacity = '0.4'; 
                pressBg.style.transform = 'scale(1.05)';
            });
            
            item.addEventListener('mouseleave', () => {
                pressBg.style.opacity = '0';
                pressBg.style.transform = 'scale(1)';
            });
        });
    </script>
</body>
</html>
